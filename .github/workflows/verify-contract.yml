name: Verify contract

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files are present
        run: |
          set -euo pipefail
          required=(
            "AGENTS.md"
            "README.md"
            "CHANGELOG.md"
            "init-agents"
            "templates/CLAUDE.md"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ -f "$f" ]]; then
              echo "ok   $f"
            else
              echo "MISSING $f"
              missing=1
            fi
          done
          exit $missing

      - name: init-agents is valid bash and executable
        run: |
          set -euo pipefail
          bash -n init-agents
          test -x init-agents || { echo "init-agents is not executable (chmod +x)"; exit 1; }
          echo "init-agents: syntax ok and executable"

      - name: CHANGELOG mentions a version
        run: |
          set -euo pipefail
          grep -Eq '^\## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md \
            && echo "CHANGELOG has a versioned entry" \
            || { echo "CHANGELOG.md has no semver entry"; exit 1; }
